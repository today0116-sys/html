<!DOCTYPE html>
<html lang="ko">
<head>

    <title>테이블태그</title>
    <link rel="stylesheet" href="https://ticktapcode.github.io/html/table.css">

<body>

 <tr>

 <tr>

      <td colspan="3">내용</td>
    
</tr>
